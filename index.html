<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EET Study Guide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>EET Study Guide</h1>

        <!-- Semester Tabs -->
        <div class="semester-row">
            <button class="semester-tab active" data-semester="1">Semester 1</button>
            <button class="semester-tab" data-semester="2">Semester 2</button>
            <button class="semester-tab" data-semester="3">Semester 3</button>
            <button class="semester-tab" data-semester="4">Semester 4</button>
        </div>

        <!-- Semester 1 Panel -->
        <div class="semester-panel" id="semester-1">
            <div class="subfolder-row">
                <button class="subfolder-tab" data-semester-class="1 205">ELCT 205 (Electrical Principles)</button>
                <button class="subfolder-tab" data-semester-class="1 232">ELTR 232 (Electronic Principles)</button>
                <button class="subfolder-tab" data-semester-class="1 247">ENVS 247 (Safety and Environment)</button>
                <button class="subfolder-tab" data-semester-class="1 237">MATH 237 (Math for Technologists)</button>
                <button class="subfolder-tab" data-semester-class="1 238">COMM 238 (Technical Communication I)</button>
                <button class="subfolder-tab" data-semester-class="1 213">COMP 213 (Computing for Engineering
                    Technology)</button>
            </div>
            <div class="subfolder-content" id="subfolder-content-1">
                <div class="paper-sidebar">
                    <div class="topic-list" id="topic-list-1">
                        <!-- Populated by script.js when a subfolder tab is clicked -->
                    </div>
                </div>
                <div class="paper-main" id="paper-main-1">
                    <div class="placeholder-note">Select a course above, then choose a topic from the sidebar.</div>
                </div>
            </div>
        </div>

        <!-- Semester 2 Panel -->
        <div class="semester-panel hidden" id="semester-2">
            <div class="subfolder-row">
                <button class="subfolder-tab" data-semester-class="2 1">ELEC 266 (Electrical Practices)</button>
                <button class="subfolder-tab" data-semester-class="2 2">ELEC 291 (Electrical Analysis)</button>
                <button class="subfolder-tab" data-semester-class="2 3">ELTR 262 (Power Electronics)</button>
                <button class="subfolder-tab" data-semester-class="2 4">ENGD 238 (Electrical Diagrams and
                    AutoCAD)</button>
                <button class="subfolder-tab" data-semester-class="2 5">MATH 280 (Calculus for Technologists)</button>
                <button class="subfolder-tab" data-semester-class="2 6">COMM 288 (Technical Communication II)</button>
            </div>
            <div class="subfolder-content" id="subfolder-content-2">
                <div class="paper-sidebar">
                    <div class="topic-list" id="topic-list-2">
                    </div>
                </div>
                <div class="paper-main" id="paper-main-2">
                    <div class="placeholder-note">Select a course above, then choose a topic from the sidebar.</div>
                </div>
            </div>
        </div>

        <!-- Semester 3 Panel -->
        <div class="semester-panel hidden" id="semester-3">
            <div class="subfolder-row">
                <button class="subfolder-tab" data-semester-class="3 309">CNTR 309 (PLC Premium Unity Pro
                    Applications)</button>
                <button class="subfolder-tab" data-semester-class="3 301">DSGN 301 (Electrical Design
                    Principles)</button>
                <button class="subfolder-tab" data-semester-class="3 302">ELEC 302 (Generation and Grid
                    Operations)</button>
                <button class="subfolder-tab" data-semester-class="3 306">ELEC 306 (Machine Applications)</button>
                <button class="subfolder-tab" data-semester-class="3 352">ELEC 352 (Rotating Machines)</button>
                <button class="subfolder-tab" data-semester-class="3 353">ELEC 353 (Transformer Applications)</button>
                <button class="subfolder-tab" data-semester-class="3 333">PROJ 333 (Technical Project
                    Management)</button>
            </div>
            <div class="subfolder-content" id="subfolder-content-3">
                <div class="paper-sidebar">
                    <div class="topic-list" id="topic-list-3">
                    </div>
                </div>
                <div class="paper-main" id="paper-main-3">
                    <div class="placeholder-note">Select a course above, then choose a topic from the sidebar.</div>
                </div>
            </div>
        </div>

        <!-- Semester 4 Panel -->
        <div class="semester-panel hidden" id="semester-4">
            <div class="subfolder-row">
                <button class="subfolder-tab" data-semester-class="4 358">CNTR 358 (PLC Contrologix
                    Applications)</button>
                <button class="subfolder-tab" data-semester-class="4 396">DSGN 396 (Industrial Electrical
                    Design)</button>
                <button class="subfolder-tab" data-semester-class="4 374">ELCM 374 (Industrial Networks &
                    Communications)</button>
                <button class="subfolder-tab" data-semester-class="4 361">ELEC 361 (Power System Analysis)</button>
                <button class="subfolder-tab" data-semester-class="4 364">ELEC 364 (Protection and Control)</button>
                <button class="subfolder-tab" data-semester-class="4 373">PROJ 373 (Capstone Project Course)</button>
            </div>
            <div class="subfolder-content" id="subfolder-content-4">
                <div class="paper-sidebar">
                    <div class="topic-list" id="topic-list-4">
                    </div>
                </div>
                <div class="paper-main" id="paper-main-4">
                    <div class="placeholder-note">Select a course above, then choose a topic from the sidebar.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
